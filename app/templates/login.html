{% extends "base.html" %}
{% block content %}
<div class="card login-card">
  <h1>QMS Portal Giriş</h1>
  {% if error %}<div class="alert">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <label>Kullanıcı adı</label>
    <input name="username" required autofocus>
    <label>Şifre</label>
    <input name="password" type="password" required>
    <button type="submit">Giriş</button>
  </form>
  <p class="muted">{% if ldap_enabled %}AD hesabınızla veya yerel admin hesabıyla giriş yapın.{% else %}İlk kurulum: admin / admin123. İlk iş olarak değiştirin.{% endif %}</p>
</div>
{% endblock %}
